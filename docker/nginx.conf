server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Video generation jobs are polled, not held open, so this isn't
        # strictly required for /generate itself — but download endpoints
        # stream multi-hundred-MB files, so generous timeouts matter here.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
